services:
  - type: web
    name: oylikrasxot-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_NAME
        value: Oylik Rasxot Bot
      - key: TIMEZONE
        value: Asia/Tashkent
      - key: SECRET_KEY
        generateValue: true
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_TELEGRAM_ID
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: oylikrasxot-db
          property: connectionString

databases:
  - name: oylikrasxot-db
    plan: free
    databaseName: rasxot_bot
    user: rasxot_user
