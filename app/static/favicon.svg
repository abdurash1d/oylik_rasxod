<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E477A"/>
      <stop offset="1" stop-color="#111B33"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#bg)" stroke="rgba(125,211,252,0.18)"/>
  <polyline points="11,32 20,24 27,28 37,14" fill="none" stroke="url(#line)"
    stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="37" cy="14" r="3" fill="#67e8f9" filter="url(#glow)"/>
</svg>
