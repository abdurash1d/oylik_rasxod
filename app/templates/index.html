<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121D36" />
  <title>Финансы</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script>
    // Apply saved theme before first paint to avoid a flash.
    try {
      var savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark" || savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", savedTheme);
      }
    } catch (e) {}
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="container">

    <!-- Top bar: brand + theme/language toggles -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="30" height="30">
            <defs>
              <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#1E477A"/><stop offset="1" stop-color="#111B33"/>
              </linearGradient>
              <linearGradient id="lln" x1="0" y1="1" x2="1" y2="0">
                <stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#22d3ee"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#lbg)" stroke="rgba(125,211,252,0.22)"/>
            <polyline points="11,32 20,24 27,28 37,14" fill="none" stroke="url(#lln)"
              stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="37" cy="14" r="3" fill="#67e8f9"/>
          </svg>
        </span>
        <span class="brand-text" data-i18n="app_title">Финансы</span>
      </div>
      <div class="topbar-actions">
        <button id="themeToggle" type="button" class="icon-toggle" aria-label="Theme">☾</button>
        <button id="langToggle" type="button" class="lang-toggle" aria-label="Language">RU</button>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tabbar" role="tablist">
      <button type="button" class="tab-btn active" role="tab" aria-selected="true" data-tab="report" data-i18n="tab_report">Отчёт</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-tab="debts" data-i18n="tab_debts">Долги</button>
    </nav>

    <!-- ===== REPORT TAB ===== -->
    <div id="tab-report" class="tab-panel" role="tabpanel">

      <div class="month-picker">
        <input id="year" type="number" min="2020" max="2100" value="{{ year }}" aria-label="Год" />
        <input id="month" type="number" min="1" max="12" value="{{ month }}" aria-label="Месяц" />
        <button id="reloadBtn" type="button" class="btn-ghost" data-i18n="update">Обновить</button>
      </div>

      <!-- Ring -->
      <section class="ring-section">
        <div class="ring" id="ring">
          <div class="ring-inner">
            <div class="ring-label" id="ringLabel" data-i18n="ring_spent">ПОТРАЧЕНО</div>
            <div class="ring-amount" id="ringAmount">0</div>
            <div class="ring-sub" id="ringSub">—</div>
          </div>
        </div>
        <div class="legend">
          <span id="legendSaved">—</span>
          <span><span data-i18n="income">Доход</span> <b id="legendIncome">0</b></span>
        </div>
      </section>

      <!-- Categories -->
      <section class="categories card">
        <div class="section-label" data-i18n="categories_title">РАСХОДЫ ПО КАТЕГОРИЯМ</div>
        <div id="categoryList" class="category-bars"></div>
      </section>

      <!-- Add (segmented expense / income) -->
      <section class="add">
        <div class="segmented" role="tablist">
          <button type="button" class="seg-btn active" role="tab" aria-selected="true" data-tab="expense" data-i18n="seg_expense">Расход</button>
          <button type="button" class="seg-btn" role="tab" aria-selected="false" data-tab="income" data-i18n="seg_income">Доход</button>
        </div>

        <form id="expenseForm" class="form">
          <label>
            <span data-i18n="f_category">Категория</span>
            <select id="category" required></select>
          </label>
          <div class="row">
            <label class="grow">
              <span data-i18n="f_amount">Сумма (сум)</span>
              <input id="amount" type="number" min="1" step="1" required />
            </label>
            <label>
              <span data-i18n="f_date">Дата</span>
              <input id="expenseDate" type="date" required />
            </label>
          </div>
          <label>
            <span data-i18n="f_note">Заметка</span>
            <input id="note" type="text" maxlength="1024" data-i18n-ph="optional" placeholder="необязательно" />
          </label>
          <button type="submit" class="btn-primary" data-i18n="save">Сохранить</button>
          <p id="formStatus" class="status" role="status"></p>
        </form>

        <form id="incomeForm" class="form hidden">
          <label>
            <span data-i18n="f_income_type">Тип дохода</span>
            <select id="incomeType" required></select>
          </label>
          <div class="row">
            <label class="grow">
              <span data-i18n="f_amount">Сумма (сум)</span>
              <input id="incomeAmount" type="number" min="1" step="1" required />
            </label>
            <label>
              <span data-i18n="f_date">Дата</span>
              <input id="incomeDate" type="date" required />
            </label>
          </div>
          <label>
            <span data-i18n="f_note">Заметка</span>
            <input id="incomeNote" type="text" maxlength="1024" data-i18n-ph="optional" placeholder="необязательно" />
          </label>
          <button type="submit" class="btn-primary" data-i18n="save">Сохранить</button>
          <p id="incomeFormStatus" class="status" role="status"></p>
        </form>
      </section>

      <!-- History -->
      <section class="history card">
        <div class="section-label" data-i18n="history_title">ИСТОРИЯ</div>
        <p id="ledgerStatus" class="status" role="status"></p>
        <div id="ledgerList"></div>
      </section>

    </div>

    <!-- ===== DEBTS TAB ===== -->
    <div id="tab-debts" class="tab-panel" role="tabpanel" hidden>

      <section class="debt-summary card">
        <div class="debt-net">
          <span class="debt-net-label" data-i18n="debts_net">Чистый баланс</span>
          <span class="debt-net-value" id="debtNet">0</span>
        </div>
        <div class="debt-net-breakdown">
          <span class="pos"><span data-i18n="they_owe">Мне должны</span> <b id="debtLentTotal">0</b></span>
          <span class="neg"><span data-i18n="i_owe">Я должен</span> <b id="debtBorrowedTotal">0</b></span>
        </div>
      </section>

      <p id="debtStatus" class="status" role="status"></p>

      <section class="card debt-group">
        <div class="section-label" data-i18n="group_lent">МНЕ ДОЛЖНЫ</div>
        <div id="debtListLent"></div>
      </section>

      <section class="card debt-group">
        <div class="section-label" data-i18n="group_borrowed">Я ДОЛЖЕН</div>
        <div id="debtListBorrowed"></div>
      </section>

      <div class="debt-actions">
        <button type="button" class="btn-primary" id="addLentBtn">+ <span data-i18n="add_lent">Я дал в долг</span></button>
        <button type="button" class="btn-primary alt" id="addBorrowedBtn">+ <span data-i18n="add_borrowed">Я взял в долг</span></button>
      </div>

    </div>
  </div>

  <!-- ===== Modal (add debt / add repayment) ===== -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-action="modal-close"></div>
    <div class="modal-sheet" role="dialog" aria-modal="true">
      <h2 class="modal-title" id="modalTitle"></h2>
      <form id="modalForm" class="form">
        <label id="modalPersonRow">
          <span data-i18n="debt_person">Имя</span>
          <input id="modalPerson" type="text" maxlength="255" />
        </label>
        <div class="row">
          <label class="grow">
            <span id="modalAmountLabel" data-i18n="f_amount">Сумма (сум)</span>
            <input id="modalAmount" type="number" min="1" step="1" required />
          </label>
          <label>
            <span data-i18n="f_date">Дата</span>
            <input id="modalDate" type="date" required />
          </label>
        </div>
        <label>
          <span data-i18n="f_note">Заметка</span>
          <input id="modalNote" type="text" maxlength="1024" data-i18n-ph="optional" placeholder="необязательно" />
        </label>
        <div class="modal-buttons">
          <button type="button" class="btn-ghost" data-action="modal-close" data-i18n="cancel">Отмена</button>
          <button type="submit" class="btn-primary" data-i18n="add">Добавить</button>
        </div>
        <p id="modalStatus" class="status" role="status"></p>
      </form>
    </div>
  </div>

  <script>
    window.APP_CONFIG = {
      apiBase: "{{ api_base }}",
      year: {{ year }},
      month: {{ month }},
    };
  </script>
  <script src="/static/i18n.js" defer></script>
  <script src="/static/app.js" defer></script>
</body>
</html>
